<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外贸谈判实战复盘 - 商务英语学习</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('dialogue');

            const dialogueData = [
                { role: 'Buyer', text: "We're interested, but your unit price is 15% above our budget.", highlight: "above our budget" },
                { role: 'Seller', text: "I understand. However, our quality meets ISO standards which reduces your long-term maintenance costs.", highlight: "reduces long-term costs" },
                { role: 'Buyer', text: "If we increase the order volume to 5,000 units, can you offer a discount?", highlight: "order volume" }
            ];

            const vocabData = [
                { word: "Concession", mean: "让步", detail: "In negotiations, a compromise or yielding." },
                { word: "Lead time", mean: "交货期", detail: "The time between the initiation and completion of a production process." },
                { word: "Break-even point", mean: "盈亏平衡点", detail: "The production level where total revenues equal total expenses." }
            ];

            return (
                <div class="max-w-4xl mx-auto p-6">
                    <header class="mb-10 text-center">
                        <h1 class="text-3xl font-bold text-slate-800">外贸谈判实战复盘</h1>
                        <p class="text-slate-500 mt-2">点击下方标签切换学习维度</p>
                    </header>

                    <div class="flex space-x-2 mb-8 bg-white p-1 rounded-xl shadow-sm border border-slate-200">
                        {['dialogue', 'vocab', 'strategy'].map(tab => (
                            <button 
                                key={tab}
                                onClick={() => setActiveTab(tab)}
                                class={`flex-1 py-2 px-4 rounded-lg transition-all ${activeTab === tab ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'}`}
                            >
                                {tab === 'dialogue' ? '情景再现' : tab === 'vocab' ? '词汇解析' : '谈判技巧'}
                            </button>
                        ))}
                    </div>

                    <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100 min-h-[400px]">
                        {activeTab === 'dialogue' && (
                            <div class="space-y-4">
                                {dialogueData.map((d, i) => (
                                    <div key={i} class={`p-4 rounded-lg ${d.role === 'Buyer' ? 'bg-slate-50 border-l-4 border-slate-400' : 'bg-blue-50 border-l-4 border-blue-400'}`}>
                                        <span class="font-bold text-sm uppercase tracking-wider text-slate-400">{d.role}</span>
                                        <p class="text-slate-700 mt-1">{d.text}</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'vocab' && (
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {vocabData.map((v, i) => (
                                    <div key={i} class="p-4 border border-slate-100 rounded-xl hover:bg-blue-50 transition-colors">
                                        <h3 class="text-lg font-bold text-blue-600">{v.word} <span class="text-sm font-normal text-slate-400">{v.mean}</span></h3>
                                        <p class="text-slate-600 text-sm mt-2">{v.detail}</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'strategy' && (
                            <div class="prose prose-slate">
                                <h3 class="text-xl font-semibold mb-4">谈判逻辑深度剖析</h3>
                                <ul class="space-y-4 text-slate-600">
                                    <li class="flex items-start">
                                        <span class="bg-green-100 text-green-700 px-2 py-1 rounded mr-3 text-xs font-bold">技巧 1</span>
                                        以“价值”对冲“价格”：当客户抱怨价格高时，应迅速转向维护成本、耐用性等隐形价值。
                                    </li>
                                    <li class="flex items-start">
                                        <span class="bg-green-100 text-green-700 px-2 py-1 rounded mr-3 text-xs font-bold">技巧 2</span>
                                        阶梯式报价：利用起订量（MOQ）作为筹码，引导客户增加订单量以换取单价优惠。
                                    </li>
                                </ul>
                            </div>
                        )}
                    </div>

                    <footer class="mt-12 text-center text-slate-400 text-sm">
                        © 2026 外贸职场竞争力提升 | Powered by Gemini Canvas
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
